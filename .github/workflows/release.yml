name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          DIST_DIR="$RUNNER_TEMP/dist"
          mkdir -p "$DIST_DIR"
          GOOS=darwin  GOARCH=arm64 go build -o "$DIST_DIR/agentctl_darwin_arm64"  .
          GOOS=darwin  GOARCH=amd64 go build -o "$DIST_DIR/agentctl_darwin_amd64"  .
          GOOS=linux   GOARCH=amd64 go build -o "$DIST_DIR/agentctl_linux_amd64"   .
          GOOS=linux   GOARCH=arm64 go build -o "$DIST_DIR/agentctl_linux_arm64"   .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/dist/*
          generate_release_notes: true
